# Development-only: starts DB services locally (without API/nginx)
# Use the root docker-compose.yml for full stack deployment
services:
  # PostgreSQL Database
  postgres:
    image: postgres:16
    container_name: yuusell-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: yuusell
      POSTGRES_PASSWORD: yuusell_dev
      POSTGRES_DB: yuusell_dev
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U yuusell -d yuusell_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Sessions
  redis:
    image: redis:7-alpine
    container_name: yuusell-redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO (S3-compatible Object Storage)
  minio:
    image: minio/minio
    container_name: yuusell-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  minio_data:
